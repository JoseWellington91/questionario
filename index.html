<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVALIAÇÃO TÉCNICA - CYBERSEGURANÇA - UC3</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-purple: #8A2BE2;
            --cyber-blue: #00FFFF;
            --cyber-green: #00FF00;
            --cyber-red: #FF0000;
            --dark-bg: #0A0A0A;
            --light-gray: #BBBBBB;
            --text-color: #EEEEEE;
            --border-glow: 2px solid var(--cyber-blue);
            --shadow-glow: 0 0 15px rgba(0, 255, 255, 0.5);
            --error-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-color);
            font-family: 'Roboto Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            font-size: 16px;
            line-height: 1.6;
            text-shadow: 0 0 5px rgba(0, 255, 255, 0.2);
        }

        #terminal {
            width: 90%;
            max-width: 900px;
            border: var(--border-glow);
            padding: 30px;
            box-shadow: var(--shadow-glow);
            background: rgba(15, 15, 15, 0.95);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }

        header {
            text-align: center;
            border-bottom: var(--border-glow);
            margin-bottom: 25px;
            padding-bottom: 15px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            margin: 0;
            text-transform: uppercase;
            color: var(--cyber-blue);
            text-shadow: 0 0 10px var(--cyber-blue);
        }

        h2 {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.9rem;
            color: var(--cyber-green);
            margin: 10px 0 0;
        }

        .hidden { display: none; }

        input[type="text"] {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--cyber-green);
            border-radius: 4px;
            color: var(--cyber-green);
            font-family: 'Roboto Mono', monospace;
            font-size: 1.1rem;
            width: calc(100% - 22px);
            padding: 10px;
            outline: none;
            margin-top: 20px;
        }

        .btn {
            background: var(--cyber-blue);
            color: var(--dark-bg);
            border: none;
            padding: 12px 25px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 25px;
            text-transform: uppercase;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.8rem;
            border-radius: 4px;
        }

        .btn:hover { background: var(--cyber-green); }

        .question-text { font-size: 1.2rem; margin-bottom: 20px; color: var(--cyber-blue); }

        .option {
            display: block;
            border: 1px solid var(--cyber-purple);
            background: rgba(50, 0, 100, 0.2);
            margin: 10px 0;
            padding: 15px;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.3s;
        }

        .option:hover { background: rgba(0, 255, 255, 0.1); border-color: var(--cyber-blue); }
        .correct-answer { background: rgba(0, 255, 0, 0.2) !important; border-color: var(--cyber-green) !important; }
        .wrong-answer { background: rgba(255, 0, 0, 0.2) !important; border-color: var(--cyber-red) !important; }

        #feedback { padding: 15px; margin-top: 15px; border-radius: 4px; font-weight: bold; }
        .feedback-correct { color: var(--cyber-green); border: 1px solid var(--cyber-green); }
        .feedback-wrong { color: var(--cyber-red); border: 1px solid var(--cyber-red); }

        .summary { font-size: 1.2rem; }
        .highlight { color: var(--cyber-blue); }
    </style>
</head>
<body>

<div id="terminal">
    <header>
        <h1>AVALIAÇÃO TÉCNICA - UC3</h1>
        <h2>Sistemas Operacionais e Serviços de Rede</h2>
    </header>

    <div id="setup-screen">
        <p>> Estabelecendo conexão com o servidor de avaliação...</p>
        <p>> Digite sua identificação (Nome Completo):</p>
        <input type="text" id="user-name" autocomplete="off" autofocus>
        <button class="btn" onclick="startQuiz()">Iniciar Protocolo</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <p id="q-number" style="text-align: right; color: var(--light-gray);"></p>
        <div id="q-text" class="question-text"></div>
        <div id="options-container"></div>
        <div id="feedback" class="hidden"></div>
        <button id="next-btn" class="btn hidden" onclick="loadNextQuestion()">Próxima Fase >></button>
    </div>

    <div id="result-screen" class="hidden">
        <div class="summary">
            <p class="highlight">LOG DE FINALIZAÇÃO DO SISTEMA:</p>
            <p>OPERADOR: <span id="res-name" class="highlight"></span></p>
            <p>STATUS: <span id="res-status"></span></p>
            <hr style="border: 1px solid var(--cyber-blue); margin: 20px 0;">
            <p>ACERTOS: <span id="res-hits" style="color: var(--cyber-green)"></span></p>
            <p>ERROS: <span id="res-misses" style="color: var(--cyber-red)"></span></p>
            <p>PERFORMANCE: <span id="res-score" class="highlight"></span>%</p>
            <button class="btn" onclick="window.print()">Gerar Relatório (PDF)</button>
        </div>
    </div>
</div>

<script>
    const questions = [
        { q: "Qual a principal vantagem da virtualização de servidores em ambientes corporativos?", options: ["Aumentar o consumo de hardware físico.", "Consolidação de servidores e otimização de recursos.", "Eliminar a necessidade de sistemas operacionais."], correct: 1 },
        { q: "No Proxmox/KVM, o que caracteriza um Hypervisor do Tipo 1?", options: ["Roda sobre um sistema operacional convencional (ex: Windows).", "Roda diretamente no hardware (Bare-metal).", "É um software de emulação de jogos."], correct: 1 },
        { q: "Qual o comando utilizado no Debian para atualizar a lista de repositórios?", options: ["apt upgrade", "apt update", "apt install"], correct: 1 },
        { q: "Qual diretório do Linux armazena os arquivos de configuração do sistema?", options: ["/home", "/var", "/etc"], correct: 2 },
        { q: "O que significa a sigla DORA no processo do DHCP?", options: ["Discover, Offer, Request, Acknowledge", "Data, Output, Read, Access", "Direct, Open, Remote, Active"], correct: 0 },
        { q: "Qual a função do registro 'PTR' em um servidor DNS?", options: ["Apontar um nome para um endereço IP.", "Realizar a resolução reversa (IP para Nome).", "Definir o servidor de e-mail do domínio."], correct: 1 },
        { q: "No Samba 4, qual o comando utilizado para provisionar um novo domínio AD DC?", options: ["samba-tool domain provision", "smbclient -L localhost", "apt install samba"], correct: 0 },
        { q: "Qual o principal arquivo de configuração do serviço Samba?", options: ["/etc/samba/samba.conf", "/etc/samba/smb.conf", "/etc/default/samba"], correct: 1 },
        { q: "O Kerberos é um componente essencial do Samba AD DC. Qual sua função principal?", options: ["Serviço de arquivos.", "Protocolo de autenticação segura baseada em tickets.", "Resolução de nomes NetBIOS."], correct: 1 },
        { q: "Qual comando é usado para verificar o status de um serviço no sistema via systemd?", options: ["service status name", "systemctl status name", "ps aux | grep name"], correct: 1 },
        { q: "No Nginx, onde geralmente ficam os arquivos de configuração dos sites ativos?", options: ["/etc/nginx/sites-available/", "/etc/nginx/sites-enabled/", "/var/www/html/"], correct: 1 },
        { q: "Qual a porta padrão utilizada pelo protocolo HTTP?", options: ["443", "22", "80"], correct: 2 },
        { q: "O MariaDB é um fork de qual banco de dados famoso?", options: ["PostgreSQL", "Oracle", "MySQL"], correct: 2 },
        { q: "Qual comando SQL é usado para criar um novo banco de dados no MariaDB?", options: ["NEW DATABASE nome;", "CREATE DATABASE nome;", "ADD DATABASE nome;"], correct: 1 },
        { q: "O que é um 'Server Block' no contexto do Nginx?", options: ["Um erro de servidor 500.", "Uma configuração para hospedar múltiplos sites no mesmo servidor.", "Um firewall integrado ao Nginx."], correct: 1 },
        { q: "Qual a função do arquivo /etc/resolv.conf no Linux?", options: ["Configurar o endereço IP da interface.", "Configurar os servidores DNS que o sistema deve consultar.", "Configurar as rotas estáticas."], correct: 1 },
        { q: "No ISC DHCP Server, qual opção define o gateway padrão que será enviado aos clientes?", options: ["option routers", "option domain-name-servers", "default-lease-time"], correct: 0 },
        { q: "Qual comando torna um arquivo imutável no Linux (evitando edições acidentais)?", options: ["chmod 444", "chown root", "chattr +i"], correct: 2 },
        { q: "O que é o 'samba-tool'?", options: ["Uma ferramenta gráfica para Windows.", "A interface de linha de comando principal para administrar o Samba AD DC.", "Um editor de texto para arquivos .conf"], correct: 1 },
        { q: "Qual o comando para reiniciar o serviço Nginx após uma alteração de configuração?", options: ["systemctl start nginx", "systemctl reload nginx ou restart nginx", "nginx -stop"], correct: 1 }
    ];

    let currentQuestion = 0;
    let score = 0;
    let userName = "";

    function startQuiz() {
        userName = document.getElementById('user-name').value;
        if (!userName) { alert("Por favor, identifique-se para acessar o sistema."); return; }
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        const q = questions[currentQuestion];
        document.getElementById('q-number').innerText = `QUESTÃO ${currentQuestion + 1} DE ${questions.length}`;
        document.getElementById('q-text').innerText = q.q;
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        document.getElementById('feedback').classList.add('hidden');
        document.getElementById('next-btn').classList.add('hidden');

        q.options.forEach((opt, index) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = opt;
            div.onclick = () => checkAnswer(index, div);
            optionsContainer.appendChild(div);
        });
    }

    function checkAnswer(index, element) {
        const q = questions[currentQuestion];
        const options = document.querySelectorAll('.option');
        options.forEach(opt => opt.onclick = null);

        if (index === q.correct) {
            score++;
            element.classList.add('correct-answer');
            showFeedback("ACESSO CONCEDIDO: Resposta correta.", true);
        } else {
            element.classList.add('wrong-answer');
            options[q.correct].classList.add('correct-answer');
            showFeedback(`ACESSO NEGADO: A resposta correta era: ${q.options[q.correct]}`, false);
        }
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function showFeedback(text, isCorrect) {
        const fb = document.getElementById('feedback');
        fb.innerText = text;
        fb.className = isCorrect ? 'feedback-correct' : 'feedback-wrong';
        fb.classList.remove('hidden');
    }

    function loadNextQuestion() {
        currentQuestion++;
        if (currentQuestion < questions.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        
        // Preenchimento dos dados com verificação de segurança
        const resName = document.getElementById('res-name');
        const resTime = document.getElementById('res-time');
        const resHits = document.getElementById('res-hits');
        const resMisses = document.getElementById('res-misses');
        const resScore = document.getElementById('res-score');
        const resStatus = document.getElementById('res-status');

        if (resName) resName.innerText = userName.toUpperCase();
        if (resTime) resTime.innerText = new Date().toLocaleString();
        if (resHits) resHits.innerText = score;
        if (resMisses) resMisses.innerText = questions.length - score;
        
        const percentage = (score / questions.length) * 100;
        if (resScore) resScore.innerText = percentage.toFixed(0);
        
        if (resStatus) {
            resStatus.innerText = (score / questions.length * 10) >= 7 ? "APROVADO - SISTEMA INTEGRADO" : "REPROVADO - NECESSÁRIO REBOOT TEÓRICO";
        }
    }
</script>
</body>
</html>
